<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kebab Hut</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- PAGE DE CONNEXION -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <div class="login-icon">⚙️</div>
            <h1>ADMIN KEBAB HUT</h1>
            <p id="loginTitle">Connexion</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-group" id="secretCodeGroup" style="display: none;">
                    <label>Code secret</label>
                    <input type="password" id="secretCode" placeholder="Code fourni par l'admin">
                    <small>Demandez le code au propriétaire</small>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    Se connecter
                </button>
            </form>
            
            <p class="switch-mode">
                <a href="#" id="switchMode">Pas de compte ? S'inscrire</a>
            </p>
            
            <a href="index.html" class="back-link">← Voir le site</a>
        </div>
    </div>

    <!-- PAGE DASHBOARD -->
    <div class="dashboard" id="dashboard" style="display: none;">
        <!-- Header Admin -->
        <header class="admin-header">
            <div class="admin-header-content">
                <div class="admin-logo">
                    <span class="admin-icon">⚙️</span>
                    <div>
                        <h1>ADMIN PANEL</h1>
                        <span id="userEmail">admin@kebabhut.fr</span>
                    </div>
                </div>
                <div class="admin-actions">
                    <a href="index.html" target="_blank" class="btn btn-outline">👁️ Voir le site</a>
                    <button class="btn btn-danger" id="logoutBtn">🚪 Déconnexion</button>
                </div>
            </div>
        </header>

        <!-- Contenu -->
        <main class="admin-main">
            <div class="admin-toolbar">
                <h2>Gestion du Menu</h2>
                <div class="toolbar-actions">
                    <button class="btn btn-outline" id="initMenuBtn">Initialiser le menu</button>
                    <button class="btn btn-primary" id="addProductBtn">+ Ajouter un produit</button>
                </div>
            </div>

            <!-- Liste des produits par catégorie -->
            <div id="productsList"></div>
        </main>
    </div>

    <!-- MODAL AJOUT/MODIFICATION -->
    <div class="modal" id="productModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nouveau Produit</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="productCategory" required>
                        <option value="kebabs">🥙 Kebabs</option>
                        <option value="burgers">🍔 Burgers</option>
                        <option value="tacos">🌮 Tacos</option>
                        <option value="bowls">🥗 Bowls</option>
                        <option value="frites">🍟 Frites</option>
                        <option value="boissons">🥤 Boissons</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Nom du produit</label>
                    <input type="text" id="productName" placeholder="Menu Le Classique" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" placeholder="Description du produit..." rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Prix</label>
                    <input type="text" id="productPrice" placeholder="12,50 €" required>
                </div>
                
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="productImage" accept="image/*">
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="productPopular">
                    <label for="productPopular">Produit populaire</label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    💾 Enregistrer
                </button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
